<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elder's Edge</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Syne:wght@600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:      #f9f8f5;
    --white:   #ffffff;
    --surface: #f2f1ed;
    --border:  #e4e2da;
    --border2: #cac7be;
    --text:    #1a1917;
    --muted:   #808078;
    --dim:     #b4b1a8;
    --red:     #d63b2f;
    --red2:    #b83025;
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; font-weight:300; min-height:100vh; }

  /* NAV */
  nav { position:sticky; top:0; z-index:100; background:rgba(249,248,245,0.97); backdrop-filter:blur(10px); border-bottom:1px solid var(--border); }
  .nav-inner { max-width:960px; margin:0 auto; padding:0 2rem; display:flex; align-items:center; height:56px; }
  .nav-logo { cursor:pointer; display:flex; align-items:center; transition:opacity 0.2s; }
  .nav-logo:hover { opacity:0.7; }
  .nav-links { display:flex; align-items:center; gap:0.1rem; margin-left:auto; }
  .nav-links button { background:none; border:none; cursor:pointer; font-family:'DM Mono',monospace; font-size:0.6rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--dim); padding:0.4rem 0.8rem; transition:color 0.2s; }
  .nav-links button:hover { color:var(--text); }
  .nav-links button.active { color:var(--red); }
  .nav-write { background:var(--red) !important; color:white !important; margin-left:0.6rem; border-radius:3px; }
  .nav-write:hover { background:var(--red2) !important; }

  /* LAYOUT */
  .container { max-width:960px; margin:0 auto; padding:0 2rem; }
  .view { display:none; }
  .view.active { display:block; }

  /* SITE HEADER */
  .site-header { padding:2.8rem 0 2.2rem; border-bottom:1px solid var(--border); }
  .site-header-inner { display:flex; align-items:flex-end; justify-content:space-between; gap:2rem; }
  .site-name { font-family:'Syne',sans-serif; font-weight:800; font-size:clamp(2rem,3.5vw,2.8rem); letter-spacing:-0.01em; line-height:1; color:var(--text); }
  .site-name span { color:var(--red); }
  .site-tagline { font-family:'DM Sans',sans-serif; font-weight:300; font-style:italic; font-size:0.88rem; color:var(--muted); line-height:1.65; max-width:260px; text-align:right; }

  /* FEATURED POST */
  .featured-post {
    position:relative; cursor:pointer; overflow:hidden;
    border-radius:6px; margin-bottom:2rem;
    background:var(--text); min-height:420px;
    display:flex; align-items:flex-end;
  }
  .featured-post:hover .featured-img { transform:scale(1.03); }
  .featured-img {
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; display:block; transition:transform 0.4s ease;
    border-radius:6px;
  }
  .featured-overlay {
    position:absolute; inset:0; border-radius:6px;
    background:linear-gradient(to top, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.3) 55%, rgba(0,0,0,0) 100%);
  }
  .featured-no-img {
    position:absolute; inset:0; background:var(--text); border-radius:6px;
  }
  .featured-content {
    position:relative; z-index:2; padding:2rem 2rem 2rem;
    width:100%;
  }
  .featured-label {
    font-family:'DM Mono',monospace; font-size:0.56rem; letter-spacing:0.2em;
    text-transform:uppercase; color:var(--red); background:rgba(0,0,0,0.4);
    display:inline-block; padding:0.2rem 0.6rem; border-radius:2px; margin-bottom:0.8rem;
  }
  .featured-label-plain { color:var(--red); background:none; padding:0; }
  .featured-title {
    font-family:'Syne',sans-serif; font-weight:800;
    font-size:clamp(1.5rem,3.5vw,2.2rem); letter-spacing:-0.02em; line-height:1.1;
    color:#fff; margin-bottom:0.7rem;
  }
  .featured-title-dark { color:var(--text); }
  .featured-excerpt {
    font-size:0.9rem; color:rgba(255,255,255,0.75); line-height:1.65;
    font-weight:300; max-width:580px; margin-bottom:0.8rem;
  }
  .featured-excerpt-dark { color:var(--muted); }
  .featured-meta {
    display:flex; align-items:center; gap:0.6rem;
    font-family:'DM Mono',monospace; font-size:0.54rem;
    letter-spacing:0.1em; color:rgba(255,255,255,0.5);
  }
  .featured-meta-dark { color:var(--dim); }
  .featured-read {
    font-family:'DM Mono',monospace; font-size:0.58rem; letter-spacing:0.14em;
    text-transform:uppercase; color:white; display:inline-flex; align-items:center; gap:0.4rem;
  }
  .featured-read::after { content:'→'; }
  .featured-read-dark { color:var(--red); }

  /* MEDIUM CARDS */
  .medium-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:0; }
  .medium-card {
    cursor:pointer; border-radius:4px; overflow:hidden;
    background:var(--white); border:1px solid var(--border);
    transition:all 0.15s; display:flex; flex-direction:column;
  }
  .medium-card:hover { box-shadow:0 4px 20px rgba(0,0,0,0.08); transform:translateY(-2px); }
  .medium-card:hover .mc-title { color:var(--red); }
  .mc-img { width:100%; height:160px; object-fit:cover; display:block; flex-shrink:0; }
  .mc-img-placeholder { width:100%; height:160px; background:var(--surface); flex-shrink:0; }
  .mc-body { padding:1rem 1rem 1.2rem; flex:1; display:flex; flex-direction:column; }
  .mc-meta { display:flex; align-items:center; gap:0.5rem; margin-bottom:0.4rem; }
  .mc-topic { font-family:'DM Mono',monospace; font-size:0.52rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--red); font-weight:500; }
  .mc-date { font-family:'DM Mono',monospace; font-size:0.52rem; color:var(--dim); letter-spacing:0.08em; }
  .mc-title { font-family:'Syne',sans-serif; font-weight:700; font-size:1rem; letter-spacing:-0.01em; line-height:1.2; color:var(--text); margin-bottom:0.4rem; transition:color 0.2s; }
  .mc-excerpt { font-size:0.82rem; color:var(--muted); line-height:1.6; font-weight:300; flex:1; }
  .mc-views { font-family:'DM Mono',monospace; font-size:0.52rem; color:var(--dim); margin-top:0.5rem; }

  /* LIST SECTION */
  .list-divider { display:flex; align-items:center; gap:1rem; padding:1.8rem 0 1.2rem; border-bottom:1px solid var(--border); }
  .list-divider-label { font-family:'DM Mono',monospace; font-size:0.58rem; letter-spacing:0.16em; text-transform:uppercase; color:var(--dim); flex-shrink:0; }
  .list-divider-line { flex:1; height:1px; background:var(--border); }

  /* POST LIST */
  .posts-wrap { padding:0 0 6rem; }
  .posts-bar { display:flex; align-items:center; justify-content:space-between; padding:1.4rem 0 1.2rem; border-bottom:1px solid var(--border); }
  .posts-label { font-family:'DM Mono',monospace; font-size:0.58rem; letter-spacing:0.16em; text-transform:uppercase; color:var(--dim); }
  .posts-count { font-family:'DM Mono',monospace; font-size:0.58rem; color:var(--dim); letter-spacing:0.1em; }

  .post-card { padding:1.6rem 0; border-bottom:1px solid var(--border); cursor:pointer; display:grid; grid-template-columns:1fr auto; gap:1rem; align-items:center; position:relative; transition:background 0.12s; }
  .post-card::before { content:''; position:absolute; left:-2rem; top:0; bottom:0; width:3px; background:var(--red); transform:scaleY(0); transition:transform 0.2s ease; transform-origin:bottom; }
  .post-card:hover { background:var(--white); margin:0 -2rem; padding-left:2rem; padding-right:2rem; }
  .post-card:hover::before { transform:scaleY(1); }
  .post-card:hover .pc-title { color:var(--red); }
  .pc-meta { display:flex; align-items:center; gap:0.55rem; margin-bottom:0.45rem; }
  .pc-topic { font-family:'DM Mono',monospace; font-size:0.56rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--red); font-weight:500; }
  .pc-dot { width:3px; height:3px; background:var(--dim); border-radius:50%; flex-shrink:0; }
  .pc-date { font-family:'DM Mono',monospace; font-size:0.56rem; letter-spacing:0.08em; color:var(--dim); }
  .pc-title { font-family:'Syne',sans-serif; font-weight:700; font-size:clamp(1.05rem,2vw,1.35rem); letter-spacing:-0.01em; line-height:1.2; color:var(--text); margin-bottom:0.45rem; transition:color 0.2s; }
  .pc-excerpt { font-size:0.88rem; color:var(--muted); line-height:1.7; font-weight:300; max-width:560px; }
  .pc-arrow { font-size:0.9rem; color:var(--dim); flex-shrink:0; transition:color 0.2s; }
  .post-card:hover .pc-arrow { color:var(--red); }
  .pc-thumb { width:130px; height:100px; object-fit:cover; border-radius:3px; flex-shrink:0; }

  /* STATE */
  .state-msg { padding:5rem 0; text-align:center; }
  .state-msg h3 { font-family:'Syne',sans-serif; font-weight:700; font-size:1.5rem; color:var(--text); margin-bottom:0.6rem; }
  .state-msg p { font-size:0.88rem; color:var(--muted); line-height:1.75; }
  .spinner { width:28px; height:28px; border:2px solid var(--border); border-top-color:var(--red); border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 1rem; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* SINGLE POST */
  .single-post { padding:3rem 0 6rem; }
  .back-btn { font-family:'DM Mono',monospace; font-size:0.58rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--dim); background:none; border:none; cursor:pointer; display:inline-flex; align-items:center; gap:0.5rem; margin-bottom:2.5rem; padding:0; transition:color 0.2s; }
  .back-btn:hover { color:var(--red); }
  .back-btn::before { content:'←'; }
  .single-cover { width:100%; max-height:420px; object-fit:cover; border-radius:4px; margin-bottom:2rem; display:block; }
  .single-meta { display:flex; align-items:center; gap:0.55rem; margin-bottom:0.8rem; }
  .single-topic { font-family:'DM Mono',monospace; font-size:0.58rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--red); font-weight:500; }
  .single-date { font-family:'DM Mono',monospace; font-size:0.58rem; color:var(--dim); letter-spacing:0.08em; }
  .single-title { font-family:'Syne',sans-serif; font-weight:800; font-size:clamp(1.7rem,3.5vw,2.4rem); letter-spacing:-0.02em; line-height:1.1; color:var(--text); margin-bottom:1.8rem; }
  .single-byline { font-family:'DM Mono',monospace; font-size:0.6rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--dim); margin-bottom:1rem; }
  .single-rule { width:28px; height:3px; background:var(--red); margin-bottom:2rem; border-radius:2px; }
  .post-body { font-size:1rem; line-height:1.9; color:#4e4c47; font-weight:300; }
  .post-body p { margin-bottom:1.5em; }
  .post-body strong { color:var(--text); font-weight:600; }
  .post-body em { font-style:italic; }
  .post-actions { margin-top:3rem; padding-top:1.5rem; border-top:1px solid var(--border); display:flex; gap:0.7rem; }

  /* BUTTONS */
  .btn-primary { font-family:'DM Mono',monospace; font-size:0.6rem; letter-spacing:0.12em; text-transform:uppercase; padding:0.62rem 1.3rem; background:var(--red); color:white; border:none; cursor:pointer; transition:background 0.2s; border-radius:3px; }
  .btn-primary:hover { background:var(--red2); }
  .btn-ghost { font-family:'DM Mono',monospace; font-size:0.6rem; letter-spacing:0.12em; text-transform:uppercase; padding:0.62rem 1.1rem; background:transparent; color:var(--dim); border:1px solid var(--border2); cursor:pointer; transition:all 0.2s; border-radius:3px; }
  .btn-ghost:hover { border-color:var(--text); color:var(--text); }

  /* PASSWORD GATE */
  .pw-gate { position:fixed; inset:0; background:rgba(26,25,23,0.7); backdrop-filter:blur(4px); z-index:200; display:flex; align-items:center; justify-content:center; padding:2rem; }
  .pw-box { background:var(--white); padding:2.5rem 2rem; border-radius:6px; width:100%; max-width:360px; box-shadow:0 20px 60px rgba(0,0,0,0.15); }
  .pw-box h3 { font-family:'Syne',sans-serif; font-weight:700; font-size:1.2rem; margin-bottom:0.4rem; color:var(--text); }
  .pw-box p { font-size:0.85rem; color:var(--muted); margin-bottom:1.5rem; }
  .pw-box input { width:100%; background:var(--bg); border:1px solid var(--border); border-bottom:2px solid var(--border2); padding:0.7rem 0.9rem; font-family:'DM Sans',sans-serif; font-size:1rem; color:var(--text); outline:none; border-radius:3px 3px 0 0; margin-bottom:1rem; transition:border-color 0.2s; }
  .pw-box input:focus { border-bottom-color:var(--red); }
  .pw-error { font-family:'DM Mono',monospace; font-size:0.6rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--red); margin-bottom:0.8rem; display:none; }
  .pw-actions { display:flex; gap:0.7rem; }

  /* EDITOR */
  .editor-wrap { padding:2.5rem 0 6rem; }
  .editor-heading { font-family:'Syne',sans-serif; font-weight:800; font-size:1.6rem; letter-spacing:-0.01em; color:var(--text); margin-bottom:2rem; padding-bottom:1rem; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:0.75rem; }
  .editor-heading::before { content:''; width:4px; height:1.6rem; background:var(--red); display:block; border-radius:2px; }
  .field { margin-bottom:1.4rem; }
  .field label { display:block; font-family:'DM Mono',monospace; font-size:0.55rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--dim); margin-bottom:0.45rem; }
  .field input[type="text"], .field input[type="date"], .field textarea { width:100%; background:var(--white); border:1px solid var(--border); border-bottom:2px solid var(--border2); padding:0.7rem 0.9rem; font-family:'DM Sans',sans-serif; font-size:0.97rem; font-weight:300; color:var(--text); outline:none; transition:border-color 0.2s; border-radius:3px 3px 0 0; appearance:none; -webkit-appearance:none; }
  .field input:focus, .field textarea:focus { border-bottom-color:var(--red); }
  .field textarea { min-height:320px; resize:vertical; line-height:1.8; }
  .field-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
  .toolbar { display:flex; gap:0.35rem; margin-bottom:0.45rem; flex-wrap:wrap; }
  .toolbar button { font-family:'DM Mono',monospace; font-size:0.54rem; letter-spacing:0.08em; padding:0.28rem 0.65rem; background:var(--white); border:1px solid var(--border2); color:var(--muted); cursor:pointer; transition:all 0.15s; text-transform:uppercase; border-radius:3px; }
  .toolbar button:hover { background:var(--red); color:white; border-color:var(--red); }
  .editor-actions { display:flex; gap:0.7rem; margin-top:1.8rem; padding-top:1.4rem; border-top:1px solid var(--border); }

  /* COVER PHOTO */
  .cover-upload-area { border:2px dashed var(--border2); border-radius:4px; padding:2rem; text-align:center; cursor:pointer; transition:all 0.2s; background:var(--white); position:relative; overflow:hidden; }
  .cover-upload-area:hover { border-color:var(--red); background:#fff8f8; }
  .cover-upload-area input[type="file"] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
  .cover-upload-label { font-family:'DM Mono',monospace; font-size:0.6rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--dim); pointer-events:none; }
  .cover-upload-label span { color:var(--red); }
  .cover-preview { position:relative; border-radius:4px; overflow:hidden; }
  .cover-preview img { width:100%; height:220px; object-fit:cover; display:block; border-radius:4px; }
  .cover-remove-btn { position:absolute; top:0.6rem; right:0.6rem; background:rgba(26,25,23,0.75); color:white; border:none; font-family:'DM Mono',monospace; font-size:0.55rem; letter-spacing:0.1em; text-transform:uppercase; padding:0.3rem 0.7rem; cursor:pointer; border-radius:3px; transition:background 0.2s; }
  .cover-remove-btn:hover { background:var(--red); }

  .photo-credit { font-family:'DM Mono',monospace; font-size:0.54rem; letter-spacing:0.1em; color:var(--dim); margin-top:0.4rem; margin-bottom:1rem; font-style:italic; }

  /* VIEWS, SHARE, RELATED */
  .post-stats { display:flex; align-items:center; gap:1rem; margin-bottom:0.5rem; }
  .views-badge { font-family:'DM Mono',monospace; font-size:0.56rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--dim); display:flex; align-items:center; gap:0.35rem; }
  .pc-views { font-family:'DM Mono',monospace; font-size:0.54rem; color:var(--dim); letter-spacing:0.08em; margin-top:0.3rem; }
  .share-section { margin-top:1.5rem; padding:1rem 1.4rem; background:var(--white); border:1px solid var(--border); border-radius:4px; display:flex; align-items:center; gap:0.8rem; flex-wrap:wrap; }
  .share-label { font-family:'DM Mono',monospace; font-size:0.56rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--dim); margin-right:0.2rem; }
  .share-btn { display:flex; align-items:center; gap:0.4rem; padding:0.4rem 0.85rem; background:var(--bg); border:1px solid var(--border); border-radius:20px; cursor:pointer; font-family:'DM Mono',monospace; font-size:0.58rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); transition:all 0.15s; }
  .share-btn:hover { border-color:var(--border2); color:var(--text); background:var(--surface); }
  .share-btn.copied { border-color:var(--red); color:var(--red); background:#fff5f5; }
  .related-section { margin-top:2.5rem; padding-top:2rem; border-top:1px solid var(--border); }
  .related-heading { font-family:'Syne',sans-serif; font-weight:700; font-size:1.1rem; color:var(--text); margin-bottom:1.2rem; display:flex; align-items:center; gap:0.75rem; }
  .related-heading::before { content:''; width:4px; height:1.1rem; background:var(--red); display:block; border-radius:2px; }
  .related-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:0.75rem; }
  .related-card { padding:1rem 1.1rem; background:var(--white); border:1px solid var(--border); border-radius:4px; cursor:pointer; transition:all 0.15s; }
  .related-card:hover { border-color:var(--border2); box-shadow:0 2px 12px rgba(0,0,0,0.06); }
  .related-card:hover .related-title { color:var(--red); }
  .related-topic { font-family:'DM Mono',monospace; font-size:0.52rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--red); margin-bottom:0.35rem; }
  .related-title { font-family:'Syne',sans-serif; font-weight:700; font-size:0.92rem; color:var(--text); line-height:1.3; transition:color 0.2s; }
  .related-date { font-family:'DM Mono',monospace; font-size:0.52rem; color:var(--dim); margin-top:0.35rem; letter-spacing:0.08em; }

  /* REACTIONS */
  .reactions-section { margin-top:2rem; padding:1.2rem 1.4rem; background:var(--white); border:1px solid var(--border); border-radius:4px; }
  .reactions-label { font-family:'DM Mono',monospace; font-size:0.56rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--dim); margin-bottom:0.9rem; }
  .reactions-row { display:flex; gap:0.6rem; flex-wrap:wrap; }
  .reaction-btn { display:flex; align-items:center; gap:0.4rem; padding:0.45rem 0.9rem; background:var(--bg); border:1px solid var(--border); border-radius:20px; cursor:pointer; transition:all 0.15s; font-family:'DM Sans',sans-serif; font-size:0.85rem; color:var(--muted); }
  .reaction-btn:hover { border-color:var(--border2); background:var(--surface); color:var(--text); transform:scale(1.05); }
  .reaction-btn.reacted { border-color:var(--red); background:#fff5f5; color:var(--text); }
  .reaction-btn .r-emoji { font-size:1.1rem; line-height:1; }
  .reaction-btn .r-count { font-family:'DM Mono',monospace; font-size:0.6rem; font-weight:500; letter-spacing:0.05em; min-width:12px; }
  .reactions-loading { font-family:'DM Mono',monospace; font-size:0.56rem; color:var(--dim); letter-spacing:0.1em; text-transform:uppercase; }

  /* COMMENTS */
  .comments-section { margin-top:3rem; padding-top:2rem; border-top:1px solid var(--border); }
  .comments-heading { font-family:'Syne',sans-serif; font-weight:700; font-size:1.1rem; color:var(--text); margin-bottom:1.5rem; display:flex; align-items:center; gap:0.75rem; }
  .comments-heading::before { content:''; width:4px; height:1.1rem; background:var(--red); display:block; border-radius:2px; }
  .comment-form { background:var(--white); border:1px solid var(--border); border-radius:4px; padding:1.2rem; margin-bottom:2rem; }
  .comment-form input, .comment-form textarea { width:100%; background:var(--bg); border:1px solid var(--border); border-bottom:2px solid var(--border2); padding:0.6rem 0.8rem; font-family:'DM Sans',sans-serif; font-size:0.9rem; font-weight:300; color:var(--text); outline:none; transition:border-color 0.2s; border-radius:3px 3px 0 0; appearance:none; margin-bottom:0.8rem; }
  .comment-form input:focus, .comment-form textarea:focus { border-bottom-color:var(--red); }
  .comment-form textarea { min-height:90px; resize:vertical; line-height:1.6; }
  .comment-item { padding:1.1rem 0; border-bottom:1px solid var(--border); position:relative; }
  .comment-item:last-child { border-bottom:none; }
  .comment-meta { display:flex; align-items:center; gap:0.6rem; margin-bottom:0.4rem; }
  .comment-name { font-family:'Syne',sans-serif; font-weight:700; font-size:0.88rem; color:var(--text); }
  .comment-date { font-family:'DM Mono',monospace; font-size:0.54rem; color:var(--dim); letter-spacing:0.08em; }
  .comment-body { font-size:0.9rem; color:var(--muted); line-height:1.7; font-weight:300; }
  .comment-delete { position:absolute; top:1rem; right:0; font-family:'DM Mono',monospace; font-size:0.52rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--dim); background:none; border:none; cursor:pointer; transition:color 0.2s; }
  .comment-delete:hover { color:var(--red); }
  .comments-empty { font-size:0.88rem; color:var(--dim); font-style:italic; padding:1rem 0; }
  .comments-loading { font-family:'DM Mono',monospace; font-size:0.58rem; color:var(--dim); letter-spacing:0.1em; text-transform:uppercase; padding:1rem 0; }
  .topics-view { padding:2.5rem 0 6rem; }
  .section-head { font-family:'Syne',sans-serif; font-weight:700; font-size:1.4rem; letter-spacing:-0.01em; color:var(--text); margin-bottom:1.8rem; padding-bottom:1rem; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:0.75rem; }
  .section-head::before { content:''; width:4px; height:1.2rem; background:var(--red); display:block; border-radius:2px; }
  .topic-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(155px,1fr)); gap:0.75rem; }
  .topic-card { padding:1.3rem 1.1rem; cursor:pointer; background:var(--white); border:1px solid var(--border); transition:all 0.15s; border-radius:4px; position:relative; overflow:hidden; }
  .topic-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--red); transform:scaleX(0); transition:transform 0.22s ease; border-radius:4px 4px 0 0; }
  .topic-card:hover { border-color:var(--border2); box-shadow:0 2px 12px rgba(0,0,0,0.06); }
  .topic-card:hover::before { transform:scaleX(1); }
  .topic-card:hover .topic-name { color:var(--red); }
  .topic-name { font-family:'Syne',sans-serif; font-weight:700; font-size:0.98rem; letter-spacing:-0.01em; color:var(--text); margin-bottom:0.25rem; transition:color 0.2s; }
  .topic-count { font-family:'DM Mono',monospace; font-size:0.54rem; color:var(--dim); letter-spacing:0.1em; }

  /* ABOUT */
  .about-view { padding:2.5rem 0 6rem; max-width:580px; }
  .about-view p { font-size:0.97rem; line-height:1.85; color:var(--muted); margin-bottom:1.2em; font-weight:300; }
  .about-edit-area { width:100%; min-height:180px; background:var(--white); border:1px solid var(--border); border-bottom:2px solid var(--border2); padding:0.9rem; font-family:'DM Sans',sans-serif; font-size:0.95rem; font-weight:300; color:var(--text); line-height:1.8; outline:none; resize:vertical; display:none; border-radius:3px 3px 0 0; }
  .about-edit-area:focus { border-bottom-color:var(--red); }

  /* SETTINGS */
  .settings-bar { background:var(--white); border-bottom:1px solid var(--border); max-height:0; overflow:hidden; transition:max-height 0.3s ease,padding 0.3s; padding:0; }
  .settings-bar.open { max-height:100px; padding:1rem 0; }
  .settings-inner { max-width:960px; margin:0 auto; padding:0 2rem; display:flex; align-items:center; gap:1.5rem; flex-wrap:wrap; }
  .settings-inner label { font-family:'DM Mono',monospace; font-size:0.54rem; letter-spacing:0.16em; text-transform:uppercase; color:var(--dim); margin-right:0.3rem; }
  .settings-inner input[type="text"] { background:var(--bg); border:1px solid var(--border2); padding:0.38rem 0.7rem; font-family:'DM Sans',sans-serif; font-weight:400; font-size:0.88rem; color:var(--text); outline:none; width:190px; border-radius:3px; }
  .settings-inner input[type="text"]:focus { border-color:var(--red); }

  /* FILTER */
  .filter-banner { background:var(--surface); border-left:3px solid var(--red); padding:0.55rem 1rem; display:flex; align-items:center; justify-content:space-between; font-family:'DM Mono',monospace; font-size:0.56rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); }
  .filter-clear { background:none; border:none; color:var(--red); cursor:pointer; font:inherit; }

  /* TOAST */
  .toast { position:fixed; bottom:1.8rem; right:1.8rem; background:var(--text); color:var(--bg); font-family:'DM Mono',monospace; font-size:0.6rem; letter-spacing:0.1em; text-transform:uppercase; padding:0.8rem 1.3rem; border-radius:3px; border-left:3px solid var(--red); transform:translateY(130%); transition:transform 0.3s cubic-bezier(0.22,1,0.36,1); z-index:300; pointer-events:none; }
  .toast.show { transform:translateY(0); }

  @media (max-width:640px) {
    .site-header-inner { flex-direction:column; align-items:flex-start; gap:0.5rem; }
    .site-tagline { text-align:left; max-width:100%; }
    .field-row { grid-template-columns:1fr; }
    .nav-inner, .container { padding:0 1.2rem; }
    .post-card::before { left:-1.2rem; }
    .post-card:hover { margin:0 -1.2rem; padding-left:1.2rem; padding-right:1.2rem; }
    .medium-grid { grid-template-columns:1fr; }
    .featured-post { min-height:280px; }
    .featured-content { padding:1.2rem; }
  }
</style>
</head>

<script>
  const SUPABASE_URL = 'https://xpmzxsbldvrjideqrbjl.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhwbXp4c2JsZHZyamlkZXFyYmpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2OTk0MTYsImV4cCI6MjA4OTI3NTQxNn0.klWxwJqghM1nTYH7Q16qPKOK4ERhvM0nA1xKseozXnw';
  const EDITOR_PASSWORD = 'Goobyloveshoops1999';

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let posts = [];
  let settings = JSON.parse(localStorage.getItem('blog_settings') || '{}');
  let aboutText = localStorage.getItem('blog_about') || "Hey, I'm Gabe. I write about stuff that interests me...";
  let editingPostId = null;
  let topicFilter = null;
  let authed = false;
  let pendingAction = null;
  let coverFile = null;
  let coverUrl = null;

  // ── INIT (runs after all functions defined below) ──
  // see bottom of script

  function handleHash() {
    var hash = window.location.hash;
    if (hash && hash.indexOf('#post-') === 0) {
      var id = hash.replace('#post-', '');
      var p = posts.find(function(x) { return String(x.id) === String(id); });
      if (p) { openPost(id, true); return; }
    }
    // make sure home view is active and render
    document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
    document.getElementById('view-home').classList.add('active');
    document.querySelectorAll('.nav-links button').forEach(function(b) { b.classList.remove('active'); });
    var navHome = document.getElementById('nav-home');
    if (navHome) navHome.classList.add('active');
    renderHome(topicFilter);
  }

  // wire up cover image input — deferred so DOM is ready
  window.addEventListener('load', function() {
    var coverInput = document.getElementById('coverFileInput');
    if (coverInput) {
      coverInput.addEventListener('change', function(e) {
        var file = e.target.files[0];
        if (!file) return;
        coverFile = file;
        var reader = new FileReader();
        reader.onload = function(ev) {
          document.getElementById('coverPreviewImg').src = ev.target.result;
          document.getElementById('coverUploadArea').style.display = 'none';
          document.getElementById('coverPreview').style.display = 'block';
        };
        reader.readAsDataURL(file);
      });
    }
    var removeBtn = document.getElementById('coverRemoveBtn');
    if (removeBtn) removeBtn.addEventListener('click', function() { clearCover(); });
  });

  function clearCover() {
    coverFile = null;
    coverUrl = null;
    document.getElementById('coverFileInput').value = '';
    document.getElementById('coverPreviewImg').src = '';
    document.getElementById('coverUploadArea').style.display = 'block';
    document.getElementById('coverPreview').style.display = 'none';
  }

  // ── SUPABASE ──
  async function loadPosts() {
    var result = await sb.from('posts').select('*').order('date', { ascending: false }).order('created_at', { ascending: false });
    if (result.error) {
      showError('Could not load posts. Check your Supabase setup.');
      return;
    }
    posts = result.data || [];
  }

  async function savePost(post) {
    var fields = { title: post.title, body: post.body, topic: post.topic, date: post.date, image_url: post.image_url || null, photo_credit: post.photo_credit || null };
    var result;
    if (post.id) {
      result = await sb.from('posts').update(fields).eq('id', post.id);
    } else {
      result = await sb.from('posts').insert(fields);
    }
    if (result.error) {
      toast('Error: ' + (result.error.message || JSON.stringify(result.error)));
      return false;
    }
    return true;
  }

  async function deletePostDb(id) {
    var result = await sb.from('posts').delete().eq('id', id);
    if (result.error) { toast('Error deleting post'); return false; }
    return true;
  }

  async function uploadImage(file) {
    var ext = file.name.split('.').pop();
    var filename = 'cover-' + Date.now() + '.' + ext;
    var result = await sb.storage.from('images').upload(filename, file, { upsert: true });
    if (result.error) { toast('Image upload failed: ' + result.error.message); return null; }
    var urlData = sb.storage.from('images').getPublicUrl(filename);
    return urlData.data.publicUrl;
  }

  // ── AUTH ──
  function requireAuth(action) {
    if (authed) { doAction(action); return; }
    pendingAction = action;
    document.getElementById('pwInput').value = '';
    document.getElementById('pwError').style.display = 'none';
    document.getElementById('pwGate').style.display = 'flex';
    setTimeout(function() { document.getElementById('pwInput').focus(); }, 100);
  }

  function checkPassword() {
    var val = document.getElementById('pwInput').value;
    if (val === EDITOR_PASSWORD) {
      authed = true;
      document.getElementById('pwGate').style.display = 'none';
      doAction(pendingAction);
      pendingAction = null;
    } else {
      document.getElementById('pwError').style.display = 'block';
      document.getElementById('pwInput').value = '';
      document.getElementById('pwInput').focus();
    }
  }

  function closePwGate() {
    document.getElementById('pwGate').style.display = 'none';
    pendingAction = null;
  }

  function doAction(action) {
    if (!action) return;
    if (action === 'editor') { showView('editor'); if (!editingPostId) resetEditor(); }
    else if (action === 'settings') { toggleSettings(); }
    else if (action === 'about') { toggleAboutEdit(); }
    else if (action.indexOf('edit:') === 0) { editPost(action.split(':')[1]); }
    else if (action.indexOf('deletecomment:') === 0) {
      var parts = action.split(':');
      deleteComment(parts[1], parts[2]);
    }
  }

  // ── SETTINGS ──
  function applySettings() {
    var title = settings.title || "Elder's Edge";
    var subtitle = settings.subtitle || "";
    document.title = title;
    var words = title.split(' ');
    var last = words.pop();
    var rest = words.length ? words.join(' ') + ' ' : '';
    document.getElementById('siteName').innerHTML = rest + '<span>' + last + '</span>';
    document.getElementById('siteTagline').textContent = subtitle;
    document.getElementById('settingTitle').value = settings.title || '';
    document.getElementById('settingSubtitle').value = settings.subtitle || '';
  }

  function saveSettings() {
    settings.title = document.getElementById('settingTitle').value.trim() || "Elder's Edge";
    settings.subtitle = document.getElementById('settingSubtitle').value.trim() || "A guy's take on everything";
    localStorage.setItem('blog_settings', JSON.stringify(settings));
    applySettings();
    document.getElementById('settingsBar').classList.remove('open');
    toast('Settings saved');
  }

  function toggleSettings() { document.getElementById('settingsBar').classList.toggle('open'); }

  function setTodayDate() {
    document.getElementById('postDate').value = new Date().toISOString().slice(0, 10);
  }

  // ── VIEWS ──
  function showView(name) {
    document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
    document.querySelectorAll('.nav-links button').forEach(function(b) { b.classList.remove('active'); });
    document.getElementById('view-' + name).classList.add('active');
    var navEl = document.getElementById('nav-' + name);
    if (navEl) navEl.classList.add('active');
    if (name !== 'home') topicFilter = null;
    if (name === 'home') renderHome(topicFilter);
    if (name === 'topics') renderTopics();
    if (name === 'about') renderAbout();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── HOME ──
  function showLoading() {
    var pc = document.getElementById('postCount');
    if (pc) pc.textContent = '\u2014';
    document.getElementById('postList').innerHTML = '<div class="state-msg"><div class="spinner"></div><p>Loading posts\u2026</p></div>';
  }

  function showError(msg) {
    document.getElementById('postList').innerHTML = '<div class="state-msg"><h3>Oops</h3><p>' + msg + '</p></div>';
  }

  function renderHome(filter) {
    var filtered = filter ? posts.filter(function(p) { return p.topic && p.topic.toLowerCase() === filter.toLowerCase(); }) : posts;
    var pc = document.getElementById('postCount');
    if (pc) pc.textContent = filtered.length + ' post' + (filtered.length !== 1 ? 's' : '');
    var banner = document.getElementById('filterBanner');
    if (filter) { banner.style.display = 'flex'; document.getElementById('filterLabel').textContent = 'Topic: ' + filter; }
    else { banner.style.display = 'none'; }
    var list = document.getElementById('postList');
    if (!filtered.length) {
      list.innerHTML = '<div class="state-msg"><h3>' + (filter ? 'Nothing here yet' : 'Nothing posted yet') + '</h3><p>' + (filter ? 'No posts under "' + filter + '" yet.' : 'Hit + Write and get your first take out there.') + '</p></div>';
      return;
    }

    var html = '';

    // ── FEATURED POST (most recent) ──
    var featured = filtered[0];
    var fd = new Date(featured.date + 'T12:00:00');
    var fdStr = fd.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    var hasImg = !!featured.image_url;
    html += '<div class="featured-post" onclick="openPost(\'' + featured.id + '\')">';
    if (hasImg) {
      html += '<img class="featured-img" src="' + featured.image_url + '" alt="">';
      html += '<div class="featured-overlay"></div>';
    } else {
      html += '<div class="featured-no-img"></div>';
    }
    html += '<div class="featured-content">';
    if (featured.topic) html += '<div class="featured-label' + (!hasImg ? ' featured-label-plain' : '') + '">' + featured.topic + '</div>';
    html += '<div class="featured-title' + (!hasImg ? ' featured-title-dark' : '') + '">' + featured.title + '</div>';
    html += '<div class="featured-excerpt' + (!hasImg ? ' featured-excerpt-dark' : '') + '">' + excerpt(featured.body) + '</div>';
    html += '<div class="featured-meta' + (!hasImg ? ' featured-meta-dark' : '') + '">';
    html += fdStr;
    if (featured.views) html += '<span>·</span><span>👁 ' + featured.views + '</span>';
    html += '</div>';
    html += '</div></div>';

    // ── MEDIUM CARDS (posts 2 & 3) ──
    var mediums = filtered.slice(1, 3);
    if (mediums.length) {
      html += '<div class="medium-grid">';
      mediums.forEach(function(p) {
        var d = new Date(p.date + 'T12:00:00');
        var dStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        html += '<div class="medium-card" onclick="openPost(\'' + p.id + '\')">';
        if (p.image_url) html += '<img class="mc-img" src="' + p.image_url + '" alt="">';
        else html += '<div class="mc-img-placeholder"></div>';
        html += '<div class="mc-body">';
        html += '<div class="mc-meta">';
        if (p.topic) html += '<span class="mc-topic">' + p.topic + '</span><div class="pc-dot"></div>';
        html += '<span class="mc-date">' + dStr + '</span>';
        html += '</div>';
        html += '<div class="mc-title">' + p.title + '</div>';
        html += '<div class="mc-excerpt">' + excerpt(p.body) + '</div>';
        if (p.views) html += '<div class="mc-views">👁 ' + p.views + '</div>';
        html += '</div></div>';
      });
      html += '</div>';
    }

    // ── LIST (posts 4+) ──
    var rest = filtered.slice(3);
    if (rest.length) {
      html += '<div class="list-divider"><span class="list-divider-label">More Posts</span><div class="list-divider-line"></div></div>';
      html += rest.map(function(p) {
        var d = new Date(p.date + 'T12:00:00');
        var dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        var right = p.image_url
          ? '<img class="pc-thumb" src="' + p.image_url + '" alt="">'
          : '<span class="pc-arrow">\u2192</span>';
        return '<div class="post-card" onclick="openPost(\'' + p.id + '\')">'
          + '<div>'
          + '<div class="pc-meta">'
          + (p.topic ? '<span class="pc-topic">' + p.topic + '</span><div class="pc-dot"></div>' : '')
          + '<span class="pc-date">' + dateStr + '</span>'
          + '</div>'
          + '<div class="pc-title">' + p.title + '</div>'
          + '<div class="pc-excerpt">' + excerpt(p.body) + '</div>'
          + (p.views ? '<div class="pc-views">👁 ' + p.views + '</div>' : '')
          + '</div>'
          + right
          + '</div>';
      }).join('');
    }

    list.innerHTML = html;
  }

  function clearFilter() { topicFilter = null; renderHome(null); }

  // ── SINGLE POST ──
  function openPost(id, skipHash) {
    var p = posts.find(function(x) { return String(x.id) === String(id); });
    if (!p) return;
    if (!skipHash) window.location.hash = 'post-' + id;
    incrementViews(p.id);
    var d = new Date(p.date + 'T12:00:00');
    var dateStr = d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    var html = '<button class="back-btn" onclick="goBack()">Back</button>';
    if (p.image_url) {
      html += '<img class="single-cover" src="' + p.image_url + '" alt="Cover">';
      if (p.photo_credit) html += '<div class="photo-credit">📷 ' + escHtml(p.photo_credit) + '</div>';
    }
    html += '<div class="single-meta">';
    if (p.topic) html += '<span class="single-topic">' + p.topic + '</span><div class="pc-dot"></div>';
    html += '<span class="single-date">' + dateStr + '</span></div>';
    html += '<div class="post-stats"><span class="views-badge">👁 ' + ((p.views || 0) + 1) + ' view' + (((p.views || 0) + 1) !== 1 ? 's' : '') + '</span></div>';
    html += '<div class="single-title">' + p.title + '</div>';
    html += '<div class="single-byline">By Gabe Elder</div>';
    // share buttons — at the top
    var postUrl = window.location.origin + window.location.pathname + '#post-' + p.id;
    var tweetText = encodeURIComponent(p.title + ' — ' + postUrl);
    html += '<div class="share-section">'
      + '<span class="share-label">Share</span>'
      + '<button class="share-btn" id="copyLinkBtn" onclick="copyLink(\'' + postUrl + '\')">🔗 Copy Link</button>'
      + '<a class="share-btn" href="https://twitter.com/intent/tweet?text=' + tweetText + '" target="_blank">🐦 Post on X</a>'
      + '</div>';
    html += '<div class="single-rule"></div>';
    html += '<div class="post-body">' + renderBody(p.body) + '</div>';
    html += '<div class="post-actions">'
      + '<button class="btn-primary" onclick="requireAuth(\'edit:' + p.id + '\')">Edit</button>'
      + '<button class="btn-ghost" onclick="confirmDelete(\'' + p.id + '\')">Delete</button>'
      + '</div>';
    // related posts
    var related = posts.filter(function(x) { return String(x.id) !== String(p.id) && x.topic && x.topic === p.topic; }).slice(0, 3);
    if (!related.length) related = posts.filter(function(x) { return String(x.id) !== String(p.id); }).slice(0, 3);
    if (related.length) {
      html += '<div class="related-section"><div class="related-heading">More Posts</div><div class="related-grid">';
      related.forEach(function(r) {
        var rd = new Date(r.date + 'T12:00:00');
        var rdStr = rd.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        html += '<div class="related-card" onclick="openPost(\'' + r.id + '\')">'
          + (r.topic ? '<div class="related-topic">' + r.topic + '</div>' : '')
          + '<div class="related-title">' + r.title + '</div>'
          + '<div class="related-date">' + rdStr + '</div>'
          + '</div>';
      });
      html += '</div></div>';
    }
    html += '<div class="reactions-section" id="reactionsSection">'
      + '<div class="reactions-label">React</div>'
      + '<div class="reactions-row" id="reactionsRow"><div class="reactions-loading">Loading\u2026</div></div>'
      + '</div>';
    html += '<div class="comments-section">'
      + '<div class="comments-heading">Comments</div>'
      + '<div class="comment-form">'
      + '<input type="text" id="commentName" placeholder="Your name">'
      + '<textarea id="commentBody" placeholder="Leave a comment\u2026"></textarea>'
      + '<button class="btn-primary" id="commentSubmitBtn" onclick="submitComment(\'' + p.id + '\')">Post Comment</button>'
      + '</div>'
      + '<div id="commentsList"><div class="comments-loading">Loading comments\u2026</div></div>'
      + '</div>';
    document.getElementById('singlePostContent').innerHTML = html;
    document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
    document.getElementById('view-post').classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
    loadComments(p.id);
    loadReactions(p.id);
  }

  function goBack() { window.location.hash = ''; showView('home'); renderHome(topicFilter); }

  // ── TOPICS ──
  function renderTopics() {
    var counts = {};
    posts.forEach(function(p) { if (p.topic) counts[p.topic] = (counts[p.topic] || 0) + 1; });
    var grid = document.getElementById('topicGrid');
    var entries = Object.entries(counts);
    if (!entries.length) {
      grid.innerHTML = '<p style="color:var(--dim);font-size:0.8rem;font-family:\'DM Mono\',monospace;letter-spacing:0.1em;text-transform:uppercase;padding:1rem 0;">No topics yet.</p>';
      return;
    }
    grid.innerHTML = entries.sort(function(a, b) { return b[1] - a[1]; }).map(function(e) {
      return '<div class="topic-card" onclick="filterByTopic(\'' + e[0] + '\')">'
        + '<div class="topic-name">' + e[0] + '</div>'
        + '<div class="topic-count">' + e[1] + ' post' + (e[1] !== 1 ? 's' : '') + '</div>'
        + '</div>';
    }).join('');
  }

  function filterByTopic(topic) { topicFilter = topic; showView('home'); }

  // ── ABOUT ──
  function renderAbout() {
    document.getElementById('aboutContent').innerHTML = '<p>' + aboutText.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>') + '</p>';
    document.getElementById('aboutEditor').value = aboutText;
  }

  function toggleAboutEdit() {
    document.getElementById('aboutEditor').style.display = 'block';
    document.getElementById('aboutContent').style.display = 'none';
    document.getElementById('aboutEditBtn').style.display = 'none';
    document.getElementById('aboutSaveBtn').style.display = 'inline-block';
    document.getElementById('aboutEditor').focus();
  }

  function saveAbout() {
    aboutText = document.getElementById('aboutEditor').value;
    localStorage.setItem('blog_about', aboutText);
    document.getElementById('aboutEditor').style.display = 'none';
    document.getElementById('aboutContent').style.display = '';
    document.getElementById('aboutEditBtn').style.display = 'inline-block';
    document.getElementById('aboutSaveBtn').style.display = 'none';
    renderAbout();
    toast('About updated');
  }

  // ── EDITOR ──
  function resetEditor() {
    editingPostId = null;
    document.getElementById('editorHeading').textContent = 'New Entry';
    document.getElementById('postTitle').value = '';
    document.getElementById('postTopic').value = '';
    document.getElementById('postBody').value = '';
    document.getElementById('postPhotoCredit').value = '';
    clearCover();
    setTodayDate();
  }

  function editPost(id) {
    var p = posts.find(function(x) { return String(x.id) === String(id); });
    if (!p) return;
    editingPostId = id;
    document.getElementById('editorHeading').textContent = 'Edit Entry';
    document.getElementById('postTitle').value = p.title;
    document.getElementById('postTopic').value = p.topic || '';
    document.getElementById('postDate').value = p.date;
    document.getElementById('postBody').value = p.body;
    document.getElementById('postPhotoCredit').value = p.photo_credit || '';
    clearCover();
    if (p.image_url) {
      coverUrl = p.image_url;
      document.getElementById('coverPreviewImg').src = p.image_url;
      document.getElementById('coverUploadArea').style.display = 'none';
      document.getElementById('coverPreview').style.display = 'block';
    }
    document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
    document.getElementById('view-editor').classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  async function publishPost() {
    var title = document.getElementById('postTitle').value.trim();
    var body = document.getElementById('postBody').value.trim();
    var topic = document.getElementById('postTopic').value.trim();
    var date = document.getElementById('postDate').value;
    var photoCredit = document.getElementById('postPhotoCredit').value.trim();
    if (!title) { toast('Add a title first'); return; }
    if (!body) { toast('Write something first'); return; }
    var btn = document.getElementById('publishBtn');
    btn.textContent = 'Saving\u2026';
    btn.disabled = true;
    var finalUrl = coverUrl;
    if (coverFile) {
      btn.textContent = 'Uploading photo\u2026';
      finalUrl = await uploadImage(coverFile);
      if (!finalUrl) { btn.textContent = 'Publish'; btn.disabled = false; return; }
    }
    var ok = await savePost({ id: editingPostId || null, title: title, body: body, topic: topic, date: date, image_url: finalUrl, photo_credit: photoCredit });
    btn.textContent = 'Publish';
    btn.disabled = false;
    if (!ok) return;
    var wasEditing = !!editingPostId;
    editingPostId = null;
    coverFile = null;
    coverUrl = null;
    toast(wasEditing ? 'Post updated' : 'Post published');
    await loadPosts();
    renderHome(null);
    showView('home');
  }

  function cancelEdit() { editingPostId = null; showView('home'); }

  async function confirmDelete(id) {
    if (!authed) { requireAuth('edit:' + id); return; }
    if (!confirm('Delete this post?')) return;
    var ok = await deletePostDb(id);
    if (!ok) return;
    posts = posts.filter(function(p) { return String(p.id) !== String(id); });
    toast('Post deleted');
    showView('home');
  }

  // ── VIEWS ──
  async function incrementViews(postId) {
    var p = posts.find(function(x) { return String(x.id) === String(postId); });
    if (!p) return;
    var newViews = (p.views || 0) + 1;
    p.views = newViews;
    await sb.from('posts').update({ views: newViews }).eq('id', postId);
  }

  // ── SHARE ──
  function copyLink(url) {
    navigator.clipboard.writeText(url).then(function() {
      var btn = document.getElementById('copyLinkBtn');
      if (btn) { btn.textContent = '✓ Copied!'; btn.classList.add('copied'); setTimeout(function() { btn.textContent = '🔗 Copy Link'; btn.classList.remove('copied'); }, 2000); }
    }).catch(function() {
      toast('Could not copy link');
    });
  }

  // ── REACTIONS ──
  var REACTIONS = [
    { key: 'love',      emoji: '❤️',  label: 'Love'       },
    { key: 'like',      emoji: '👍',  label: 'Like'       },
    { key: 'lmao',      emoji: '😂',  label: 'LMAO'       },
    { key: 'mindblown', emoji: '🤯',  label: 'Mind Blown' },
    { key: 'nah',       emoji: '👎',  label: 'Nah'        }
  ];

  async function loadReactions(postId) {
    var el = document.getElementById('reactionsRow');
    if (!el) return;
    var result = await sb.from('reactions').select('reaction').eq('post_id', postId);
    if (result.error) { el.innerHTML = ''; return; }
    var counts = {};
    REACTIONS.forEach(function(r) { counts[r.key] = 0; });
    (result.data || []).forEach(function(row) { if (counts[row.reaction] !== undefined) counts[row.reaction]++; });
    var myReaction = localStorage.getItem('reaction_' + postId);
    el.innerHTML = REACTIONS.map(function(r) {
      var reacted = myReaction === r.key;
      return '<button class="reaction-btn' + (reacted ? ' reacted' : '') + '" onclick="handleReaction(\'' + postId + '\', \'' + r.key + '\')">'
        + '<span class="r-emoji">' + r.emoji + '</span>'
        + '<span class="r-count">' + (counts[r.key] || 0) + '</span>'
        + '</button>';
    }).join('');
  }

  async function handleReaction(postId, reactionKey) {
    var myReaction = localStorage.getItem('reaction_' + postId);
    if (myReaction === reactionKey) {
      // undo reaction
      await sb.from('reactions').delete().eq('post_id', postId).eq('reaction', reactionKey);
      localStorage.removeItem('reaction_' + postId);
    } else {
      // remove old reaction if exists
      if (myReaction) {
        await sb.from('reactions').delete().eq('post_id', postId).eq('reaction', myReaction);
      }
      // add new reaction
      await sb.from('reactions').insert({ post_id: postId, reaction: reactionKey });
      localStorage.setItem('reaction_' + postId, reactionKey);
    }
    loadReactions(postId);
  }

  // ── COMMENTS ──
  async function loadComments(postId) {
    var el = document.getElementById('commentsList');
    if (!el) return;
    var result = await sb.from('comments').select('*').eq('post_id', postId).order('created_at', { ascending: true });
    if (result.error) { el.innerHTML = '<div class="comments-empty">Could not load comments.</div>'; return; }
    var comments = result.data || [];
    if (!comments.length) { el.innerHTML = '<div class="comments-empty">No comments yet. Be the first!</div>'; return; }
    el.innerHTML = comments.map(function(c) {
      var d = new Date(c.created_at);
      var dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      return '<div class="comment-item" id="comment-' + c.id + '">'
        + '<div class="comment-meta">'
        + '<span class="comment-name">' + escHtml(c.name) + '</span>'
        + '<span class="comment-date">' + dateStr + '</span>'
        + '</div>'
        + '<div class="comment-body">' + escHtml(c.body) + '</div>'
        + '<button class="comment-delete" onclick="deleteComment(\'' + c.id + '\', \'' + postId + '\')">✕ Delete</button>'
        + '</div>';
    }).join('');
  }

  async function submitComment(postId) {
    var nameEl = document.getElementById('commentName');
    var bodyEl = document.getElementById('commentBody');
    var name = nameEl.value.trim();
    var body = bodyEl.value.trim();
    if (!name) { toast('Add your name'); return; }
    if (!body) { toast('Write a comment first'); return; }
    var btn = document.getElementById('commentSubmitBtn');
    btn.textContent = 'Posting\u2026'; btn.disabled = true;
    var result = await sb.from('comments').insert({ post_id: postId, name: name, body: body });
    btn.textContent = 'Post Comment'; btn.disabled = false;
    if (result.error) { toast('Error posting comment'); return; }
    nameEl.value = ''; bodyEl.value = '';
    toast('Comment posted!');
    loadComments(postId);
  }

  async function deleteComment(commentId, postId) {
    if (!authed) {
      pendingAction = 'deletecomment:' + commentId + ':' + postId;
      document.getElementById('pwInput').value = '';
      document.getElementById('pwError').style.display = 'none';
      document.getElementById('pwGate').style.display = 'flex';
      setTimeout(function() { document.getElementById('pwInput').focus(); }, 100);
      return;
    }
    if (!confirm('Delete this comment?')) return;
    var result = await sb.from('comments').delete().eq('id', commentId);
    if (result.error) { toast('Error deleting comment'); return; }
    toast('Comment deleted');
    loadComments(postId);
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── FORMATTING ──
  function fmtWrap(before, after) {
    var ta = document.getElementById('postBody');
    var s = ta.selectionStart, e = ta.selectionEnd;
    ta.setRangeText(before + ta.value.slice(s, e) + after, s, e, 'end');
    ta.focus();
  }

  function fmtLine(prefix) {
    var ta = document.getElementById('postBody');
    var pos = ta.selectionStart;
    ta.setRangeText('\n' + prefix, pos, pos, 'end');
    ta.focus();
  }

  function excerpt(body) {
    return body.replace(/[#*>_\-]/g, '').slice(0, 160) + (body.length > 160 ? '\u2026' : '');
  }

  function renderBody(body) {
    return body
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/^## (.+)$/gm, '<h3 style="font-family:\'Syne\',sans-serif;font-weight:700;font-size:1.25rem;letter-spacing:-0.01em;color:var(--text);margin:2em 0 0.6em">$1</h3>')
      .replace(/^> (.+)$/gm, '<blockquote style="border-left:3px solid var(--red);padding-left:1.1rem;margin:1.5em 0;color:var(--muted);font-style:italic">$1</blockquote>')
      .replace(/^---$/gm, '<hr style="border:none;border-top:1px solid var(--border);margin:2.5em 0">')
      .split('\n\n')
      .map(function(p) { return p.startsWith('<h3') || p.startsWith('<blockquote') || p.startsWith('<hr') ? p : '<p>' + p.replace(/\n/g, '<br>') + '</p>'; })
      .join('');
  }

  var toastTimer = null;
  function toast(msg) {
    if (!msg) return;
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.style.display = 'block';
    el.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function() {
      el.classList.remove('show');
      setTimeout(function() { el.style.display = 'none'; }, 350);
      toastTimer = null;
    }, 4000);
  }

  // ── INIT ──
  applySettings();
  setTodayDate();
  showLoading();
  loadPosts().then(function() {
    handleHash();
  }).catch(function() {
    showError('Could not connect. Please refresh.');
  });
  window.addEventListener('hashchange', handleHash);

</script>
</body>
</html>
